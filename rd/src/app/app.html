<div class="app-shell">
  <header class="app-header">
    <div class="brand-group">
      <a routerLink="/" class="app-logo">RedNova</a>
      <p class="app-tagline">Foros, publicaciones y comunidad en un solo lugar</p>
    </div>

    <nav class="app-nav">
      <a routerLink="/posts" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Publicaciones</a>
      <a routerLink="/forums" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Foros</a>
      <a routerLink="/profile" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Perfil</a>
    </nav>

    <div class="app-actions">
      <ng-container *ngIf="currentUser(); else guestLinks">
        <span class="welcome-text">Hola, {{ currentUser()?.username }}</span>
        <button type="button" class="btn btn-link" (click)="logout()">Cerrar sesión</button>
      </ng-container>
      <ng-template #guestLinks>
        <a routerLink="/auth/login" class="btn btn-secondary">Ingresar</a>
        <a routerLink="/auth/register" class="btn btn-primary">Registrarse</a>
      </ng-template>
    </div>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <span>RedNova Web 2 — Interfaz en construcción</span>
  </footer>
</div>
