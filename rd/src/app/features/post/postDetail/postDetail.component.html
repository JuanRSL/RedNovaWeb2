<div class="post-detail-page">
  <a routerLink="/posts" class="back-link">← Volver a publicaciones</a>

  <p class="error-state" *ngIf="error()">{{ error() }}</p>
  <p class="loading-state" *ngIf="isLoading()">Cargando publicación…</p>

  <article *ngIf="!isLoading() && post()" class="post-detail">
    <div class="post-detail-inner">

      <div class="post-tags">
        <span class="tag">{{ post()?.forum?.name || post()?.subforum?.name }}</span>
      </div>

      <h1>{{ post()?.title }}</h1>

      <div class="post-meta">
        <span>Por {{ post()?.author?.username || 'Desconocido' }}</span>
        <span class="delimiter">·</span>
        <span>{{ post()?.createdAt | date:'medium' }}</span>
      </div>

      <div class="post-content">{{ post()?.content }}</div>

    </div>

    <div class="post-footer">
      <div class="vote-group">
        <button class="vote-btn" type="button" (click)="vote('upvote')" [class.active]="hasUpvoted()">▲</button>
        <span class="vote-score">{{ post()?.score ?? 0 }}</span>
        <span class="score-label">puntos</span>
        <button class="vote-btn" type="button" (click)="vote('downvote')" [class.active]="hasDownvoted()">▼</button>
      </div>
    </div>
  </article>

  <section *ngIf="post()">
    <rn-comment-list [postId]="post()?._id || post()?.id"></rn-comment-list>
  </section>
</div>
