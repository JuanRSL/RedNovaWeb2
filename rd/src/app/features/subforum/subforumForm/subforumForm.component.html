<div class="form-page">
  <div class="form-card">

    <div class="form-card-header">
      <h2>Crear Subforo</h2>
      <p>Agrega un nuevo subforo dentro de un foro existente</p>
    </div>

    <form (ngSubmit)="submit()" [formGroup]="form">
      <div class="form-card-body">

        <div class="form-group">
          <label>Foro</label>
          <select formControlName="forumId">
            <option value="">-- Seleccione --</option>
            <option *ngFor="let f of forums()" [value]="f._id">{{ f.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Nombre</label>
          <input formControlName="name" placeholder="Nombre del subforo" />
        </div>

        <div class="form-group">
          <label>Slug</label>
          <input formControlName="slug" placeholder="slug-del-subforo" />
        </div>

        <div class="form-group">
          <label>Descripción</label>
          <textarea formControlName="description" placeholder="¿De qué trata este subforo?"></textarea>
        </div>

        <p class="form-error" *ngIf="error()">{{ error() }}</p>

      </div>

      <div class="form-card-footer">
        <div class="actions">
          <button type="submit" [disabled]="form.invalid">Crear Subforo</button>
        </div>
      </div>

    </form>
  </div>
</div>
