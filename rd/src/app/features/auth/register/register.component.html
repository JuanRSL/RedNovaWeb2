<section class="page auth-page">
  <h1>Registrate</h1>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Nombre de usuario
      <input formControlName="username" />
    </label>

    <label>
      Email
      <input type="email" formControlName="email" />
    </label>

    <label>
      Contraseña
      <input type="password" formControlName="password" />
    </label>

    <label *ngIf="currentUser()?.roles?.includes('admin')">
      Rol de usuario
      <select formControlName="role">
        <option value="user">Usuario</option>
        <option value="moderator">Moderador</option>
        <option value="admin">Administrador</option>
      </select>
      <small>Solo administradores pueden asignar un rol.</small>
    </label>

    <button type="submit" [disabled]="form.invalid || isSubmitting()">Crear cuenta</button>

    <p class="error" *ngIf="error()">{{ error() }}</p>

    <p class="hint">
      ¿Ya tienes una cuenta? <a routerLink="/auth/login">Iniciar sesión</a>
    </p>
  </form>
</section>
